name: Deploy

# Триггерится на published-релиз (release-please создаёт релиз после мержа
# своего PR) или вручную через workflow_dispatch с указанием тега/ветки.
#
# Под капотом — git checkout --detach на тег: обходит ситуацию когда
# server-local main диверджит от origin/main.
#
# Требуемые repository secrets:
#   DEPLOY_HOST     — IP/hostname прод-сервера
#   DEPLOY_USER     — SSH-юзер
#   DEPLOY_SSH_KEY  — приватный ключ отдельного deploy-key (НЕ личный ключ)
# Деплой ожидает /srv/charger-watcher на удалёнке + docker compose в PATH.

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      ref:
        description: "Tag, branch, or SHA to deploy (e.g. v0.2.0)"
        required: true
        type: string

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: production
    steps:
      - name: SSH deploy
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: 22
          command_timeout: 10m
          script: |
            set -euo pipefail
            REF="${{ github.event.release.tag_name || inputs.ref }}"
            echo ">>> deploying ref: $REF"
            cd /srv/charger-watcher
            git fetch --tags --prune --force origin
            git checkout --detach "$REF"
            docker compose run --rm poller alembic upgrade head
            docker compose up -d --build
            sleep 5
            docker compose ps
            echo ">>> recent bot logs:"
            docker compose logs --tail=20 bot
            echo ">>> recent poller logs:"
            docker compose logs --tail=20 poller
