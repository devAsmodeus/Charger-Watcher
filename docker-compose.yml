name: charger-watcher

# Ротация stdout-логов всех сервисов — без неё json-file драйвер docker'а
# растёт без границ и съедает диск (Critical: видели уже на одном сервере).
# 10MB × 5 файлов = до 50MB на сервис.
x-logging: &default-logging
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "5"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    <<: *default-logging
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-charger}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-charger}
      POSTGRES_DB: ${POSTGRES_DB:-charger}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    <<: *default-logging
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Poller остаётся на прямом RU-IP — нужен для Malanka API
  poller:
    build: .
    restart: unless-stopped
    command: python -m poller.main
    env_file: .env
    <<: *default-logging
    environment:
      # WARNING+ дублируется в host-смонтированный logs/ как JSON-строки —
      # для быстрого `tail`/`jq` без `docker compose logs`. См. CLAUDE.md.
      LOG_ERRORS_FILE: /var/log/app/poller.errors.jsonl
    volumes:
      - ./logs:/var/log/app
    extra_hosts:
      - "${API_HOST:-_disabled}:${API_HOST_IP:-127.0.0.1}"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # VPN-туннель через CyberGhost (Frankfurt) — для bot, чтобы обойти РКН-блок Telegram API.
  # Через тот же туннель ходит Claude Code на сервере: его контейнер запускается с
  # network_mode: container:charger-watcher-gluetun (см. CLAUDE.md → "Сетевой режим").
  gluetun:
    image: qmcgaw/gluetun:latest
    container_name: charger-watcher-gluetun
    restart: unless-stopped
    <<: *default-logging
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      - VPN_SERVICE_PROVIDER=custom
      - VPN_TYPE=openvpn
      - OPENVPN_CUSTOM_CONFIG=/gluetun/openvpn.ovpn
      - OPENVPN_USER=${OPENVPN_USER}
      - OPENVPN_PASSWORD=${OPENVPN_PASSWORD}
      # Разрешить bot-у достучаться до postgres/redis по docker-сети
      - FIREWALL_OUTBOUND_SUBNETS=172.18.0.0/16
      - TZ=Europe/Minsk
    volumes:
      - ./vpn:/gluetun
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- --timeout=5 https://api.ipify.org || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  bot:
    build: .
    restart: unless-stopped
    command: python -m bot.main
    env_file: .env
    <<: *default-logging
    environment:
      LOG_ERRORS_FILE: /var/log/app/bot.errors.jsonl
    volumes:
      - ./logs:/var/log/app
    network_mode: "service:gluetun"
    depends_on:
      gluetun:
        condition: service_healthy

volumes:
  pg_data:
